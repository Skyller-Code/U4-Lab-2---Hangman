<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bonheur+Royale&display=swap" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
        <title>Hangman</title>
    </head>

    <body>
        <a href="pages/rules/rules.html">Rules</a>
        <a href="pages/SDP/U4_Lab2_SDP.html">SDP</a>
        <div id="header" class="font"><h1>The Hangiest Man</h1></div>

        <div id="hanger">
            <img id="hanger-img" src="resources/index/base.png" alt="image of the base of the hangman, you have 7 more tries">
        </div>

        <div id="hidden-word" class="hidden-word-text"></div> <!--This is where the word will be displayed, with blanks for the letters that haven't been guessed yet.-->
            
        <div id="guessed-letters" class="font">Guessed Letters: </div> <!--This is where the letters that have been guessed will be displayed.-->
    
        <div id="inp-box">
            <label class="font" for="guess">Enter your letter guess</label>
            <input type="text" id="guess" name="guess" maxlength="1" minlength="1">
            <input type="button" id="submit" class="font" onclick = "check()" value="Submit">
        </div>

        <!-- Supposed to flash an alert at user when they get a letter wrong -->
        <div id="alert-box" class="font">
            <p>YOU HAVE</p>
            <p id="chances">6</p>
            <p>MORE TRIES LEFT!</p>
        </div>

        <script src = "index.js"></script>
    </body>

</html>
